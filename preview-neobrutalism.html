<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Neobrutalism Preview — Sloto</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    background: #FFFFFF;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .card {
    border: 3px solid #1A1A18;
    box-shadow: 14px 14px 0 #1A1A18;
    max-width: 420px;
    width: 100%;
    line-height: 0;
  }

  .card img {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>
  <div class="card">
    <img src="map.png" alt="Sloto map screenshot" />
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sloto — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #FFFFFF;
      --green: #228B22;
      --text: #111111;
      --muted: #999999;
      --icon-bg: #DDDDDD;
      --drum-h: 82px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 80px;
      position: relative;
    }

    /* ── Logo — fixed top left ── */
    .logo {
      position: fixed;
      top: 28px;
      left: 32px;
      display: flex;
      align-items: baseline;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
      z-index: 10;
    }

    .logo-word {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(22px, 3vw, 32px);
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .logo-square {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 0;
      margin-left: 3px;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    /* ── Tagline — centre hero ── */
    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(24px, 4.5vw, 48px);
      font-weight: 300;
      color: var(--text);
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 56px;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) 0.22s forwards;
      line-height: 1.2;
      text-transform: none;
    }

    /* ── Drum ── */
    .drum-outer {
      width: 100%;
      max-width: 600px;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) 0.38s forwards;
    }

    .drum-window {
      position: relative;
      height: calc(var(--drum-h) * 3);
      overflow: hidden;
    }

    /* Top and bottom fade masks */
    .drum-window::before,
    .drum-window::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: calc(var(--drum-h) * 1.1);
      z-index: 3;
      pointer-events: none;
    }
    .drum-window::before {
      top: 0;
      background: linear-gradient(to bottom, #ffffff 30%, transparent);
    }
    .drum-window::after {
      bottom: 0;
      background: linear-gradient(to top, #ffffff 30%, transparent);
    }

    /* Two fading lines for centre highlight */
    .drum-line-top,
    .drum-line-bottom {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      z-index: 4;
      pointer-events: none;
      /* Fade in from centre, transparent at edges */
      background: linear-gradient(to right, transparent 0%, #CCCCCC 25%, #CCCCCC 75%, transparent 100%);
    }
    .drum-line-top {
      top: calc(var(--drum-h) * 1);
    }
    .drum-line-bottom {
      top: calc(var(--drum-h) * 2);
    }

    .drum-track {
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
    }

    .drum-item {
      height: var(--drum-h);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 18px;
      flex-shrink: 0;
    }

    .drum-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--icon-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.35s ease;
    }

    .drum-icon.active-icon {
      background: #111111;
    }

    .drum-icon svg {
      width: 19px;
      height: 19px;
      stroke: #ffffff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .drum-text {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(15px, 2.3vw, 19px);
      color: var(--text);
      letter-spacing: -0.01em;
      line-height: 1.15;
    }

    .drum-sub {
      font-size: clamp(11px, 1.1vw, 12px);
      color: var(--muted);
      font-weight: 300;
      margin-top: 2px;
    }

    /* ── Divider ── */
    .divider {
      width: 32px;
      height: 1.5px;
      background: #E2E2E2;
      margin: 44px auto;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) 0.52s forwards;
    }

    /* ── Coming Soon ── */
    .coming-soon {
      text-align: center;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) 0.62s forwards;
    }

    .cs-label {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(20px, 3.5vw, 30px);
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .cs-sub {
      font-size: clamp(12px, 1.4vw, 14px);
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #CCCCCC;
      letter-spacing: 0.08em;
      opacity: 0;
      animation: rise 0.7s ease 1s forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<main class="page">

  <div class="logo">
    <span class="logo-word">Sloto</span>
    <span class="logo-square"></span>
  </div>

  <p class="tagline">Dublin's smartest parking app</p>

  <div class="drum-outer">
    <div class="drum-window">
      <div class="drum-line-top"></div>
      <div class="drum-line-bottom"></div>
      <div class="drum-track" id="drumTrack"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="coming-soon">
    <span class="cs-label">Coming Soon</span>
    <p class="cs-sub">We're putting the final touches on something great.</p>
  </div>

</main>

<span class="footer">sloto.ie</span>

<script>
  const features = [
    {
      text: 'Street parking made easy',
      sub: 'Find available spots near you instantly',
      icon: `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2.5"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9"/></svg>`
    },
    {
      text: 'Live accessible bay sensors',
      sub: 'Real-time occupancy from smart sensors',
      icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.5" fill="white" stroke="none"/><path d="M7.5 7.5a6.5 6.5 0 0 0 0 9M16.5 7.5a6.5 6.5 0 0 1 0 9"/><path d="M4.5 4.5a11 11 0 0 0 0 15M19.5 4.5a11 11 0 0 1 0 15"/></svg>`
    },
    {
      text: 'Navigate to a spot',
      sub: 'Turn-by-turn directions to your bay',
      icon: `<svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>`
    },
    {
      text: 'Rates & operating hours',
      sub: "Know exactly what you'll pay, upfront",
      icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>`
    },
    {
      text: 'Parking reminders',
      sub: 'Never get a ticket again',
      icon: `<svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`
    },
    {
      text: 'Find your car',
      sub: 'Always know where you parked',
      icon: `<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`
    },
  ];

  const track = document.getElementById('drumTrack');
  const DRUM_H = 82;
  let current = 0;
  let isAnimating = false;

  // [ghost-last] + [6 features] + [ghost-first]
  const allItems = [features[features.length - 1], ...features, features[0]];

  allItems.forEach((f, i) => {
    const el = document.createElement('div');
    el.className = 'drum-item';
    el.innerHTML = `
      <div class="drum-icon" id="icon-${i}">${f.icon}</div>
      <div>
        <div class="drum-text">${f.text}</div>
        <div class="drum-sub">${f.sub}</div>
      </div>
    `;
    track.appendChild(el);
  });

  function getY(c) {
    return -c * DRUM_H;
  }

  function highlightCentre() {
    document.querySelectorAll('.drum-icon').forEach(el => el.classList.remove('active-icon'));
    // Centre item DOM index = current + 1 (offset by ghost-last at index 0)
    const el = document.getElementById(`icon-${current + 1}`);
    if (el) el.classList.add('active-icon');
  }

  track.style.transform = `translateY(${getY(current)}px)`;
  highlightCentre();

  function advance() {
    if (isAnimating) return;
    isAnimating = true;

    current++;

    track.style.transition = 'transform 0.48s cubic-bezier(0.4, 0, 0.2, 1)';
    track.style.transform = `translateY(${getY(current)}px)`;
    highlightCentre();

    track.addEventListener('transitionend', function onEnd() {
      track.removeEventListener('transitionend', onEnd);

      if (current >= features.length) {
        current = 0;
        track.style.transition = 'none';
        track.style.transform = `translateY(${getY(current)}px)`;
        highlightCentre();
      }

      isAnimating = false;
    }, { once: true });
  }

  function loop() {
    setTimeout(() => {
      advance();
      loop();
    }, 2400);
  }

  setTimeout(loop, 2000);
</script>

</body>
</html>
